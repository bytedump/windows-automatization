name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint + unit tests (PowerShell)
    runs-on: windows-latest
    steps:
      # Pinned to a commit SHA (not a moving tag) to prevent supply-chain tampering.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: PSScriptAnalyzer (lint)
        shell: pwsh
        run: |
          $r = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $r | Sort-Object ScriptName, Line | Format-Table -AutoSize
          if ($r.Count) { throw "PSScriptAnalyzer found $($r.Count) issue(s) above." }

      - name: Validate XML answer files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($f in 'autounattend.template.xml', 'configuration.example.xml') {
            [void][xml](Get-Content -Raw -LiteralPath $f)
            "OK: $f is well-formed XML"
          }

      - name: Pester (unit tests)
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests/unit'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  unit-tests-ps51:
    name: Unit tests (Windows PowerShell 5.1 - production runtime)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # `shell: powershell` selects Windows PowerShell 5.1 - the real target runtime. The pwsh 7 leg
      # above cannot catch the encoding/BOM/codepage class of bug (the repo's #1 documented failure
      # mode) because pwsh reads .ps1 as UTF-8 regardless of the BOM. This leg does.
      - name: Install Pester 5 (Windows PowerShell 5.1)
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Pester (unit tests, 5.1)
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests/unit'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # gitleaks-action lists the PR's commits via the API on pull_request events, which needs
    # pull-requests:read on top of the checkout's contents:read. Without it the action errors out
    # (GET /repos/.../pulls/{n}/commits fails) and the job fails on every PR while still passing on
    # push to main. Scoped to this job only, kept read-only (least privilege).
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits

      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
